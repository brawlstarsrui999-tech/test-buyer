name: BuyerPlugin
version: '2.0.0'
main: com.buyerplugin.BuyerPlugin
api-version: '1.21'
description: Байер — магазин ресурсов с серверными лимитами (v2.0)
authors: [YourName]
depend: [Vault]
softdepend: [SuperItemsTwix]

commands:
  buyer:
    description: Открыть магазин Байера
    usage: /buyer
    permission: buyer.use
    aliases: [shop, магазин]

permissions:
  buyer.use:
    description: Разрешает открыть магазин Байера
    default: true
  buyer.admin:
    description: Доступ к административным командам Байера
    default: op